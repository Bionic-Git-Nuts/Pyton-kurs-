<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lär dig Python — steg för steg</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
<style>
  :root {
    --ink: #1a2a2a;
    --paper: #f5f2e8;
    --paper-2: #ece7d6;
    --moss: #4a7c59;
    --moss-dark: #3a6147;
    --clay: #c8663d;
    --gold: #d9a441;
    --line: #d4cdb8;
    --code-bg: #1c2321;
    --code-ink: #e8e4d4;
    --ok: #4a7c59;
    --err: #b8442e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  code, pre, .mono, textarea.editor {
    font-family: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, Menlo, Consolas, monospace;
  }

  /* Layout */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 280px;
    background: var(--paper-2);
    border-right: 1px solid var(--line);
    padding: 24px 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .brand {
    padding: 0 24px 20px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 12px;
  }
  .brand .logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 1.15rem; font-weight: 700; letter-spacing: -0.01em;
  }
  .brand .logo svg { flex-shrink: 0; }
  .brand .tag { font-size: 0.8rem; color: var(--moss-dark); margin-top: 4px; font-style: italic; }

  .progress-wrap { padding: 0 24px 16px; }
  .progress-bar { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--moss), var(--gold)); width: 0%; transition: width 0.4s ease; }
  .progress-label { font-size: 0.72rem; color: var(--moss-dark); margin-top: 6px; letter-spacing: 0.03em; text-transform: uppercase; }

  .nav-list { list-style: none; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 24px;
    cursor: pointer;
    font-size: 0.92rem;
    border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .nav-item:hover { background: rgba(74,124,89,0.08); }
  .nav-item.active { background: rgba(74,124,89,0.14); border-left-color: var(--moss); font-weight: 600; }
  .nav-item.locked { opacity: 0.4; cursor: not-allowed; }
  .nav-num {
    width: 22px; height: 22px; flex-shrink: 0;
    display: grid; place-items: center;
    border-radius: 50%;
    font-size: 0.72rem; font-weight: 700;
    background: var(--line); color: var(--ink);
    font-family: ui-monospace, monospace;
  }
  .nav-item.done .nav-num { background: var(--moss); color: #fff; }
  .nav-item.active .nav-num { background: var(--clay); color: #fff; }

  .main { flex: 1; max-width: 820px; margin: 0 auto; padding: 48px 40px 120px; width: 100%; }

  .eyebrow { font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--clay); font-weight: 700; margin-bottom: 8px; }
  h1 { font-size: 2.1rem; line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 16px; }
  h2 { font-size: 1.35rem; margin: 32px 0 12px; letter-spacing: -0.01em; }
  p { margin-bottom: 14px; font-size: 1.05rem; }
  .lead { font-size: 1.15rem; color: #34413f; margin-bottom: 24px; }
  ul.plain { margin: 0 0 16px 22px; }
  ul.plain li { margin-bottom: 6px; }

  .callout {
    background: var(--paper-2);
    border-left: 3px solid var(--gold);
    padding: 14px 18px;
    margin: 18px 0;
    border-radius: 0 6px 6px 0;
    font-size: 0.98rem;
  }
  .callout strong { color: var(--moss-dark); }

  .inline-code {
    background: var(--paper-2);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 0.9em;
    color: var(--clay);
    border: 1px solid var(--line);
  }

  /* Code editor */
  .code-block { margin: 20px 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--code-bg); box-shadow: 0 4px 20px rgba(28,35,33,0.12); }
  .code-head {
    background: #2a332f; color: #9db3a8;
    padding: 8px 14px; font-size: 0.78rem;
    display: flex; align-items: center; justify-content: space-between;
    letter-spacing: 0.03em;
  }
  .code-head .dots { display: flex; gap: 6px; }
  .code-head .dots i { width: 11px; height: 11px; border-radius: 50%; display: block; }
  .dots i:nth-child(1){ background:#e06c5a;} .dots i:nth-child(2){ background:#d9a441;} .dots i:nth-child(3){ background:#4a7c59;}
  textarea.editor {
    width: 100%;
    background: var(--code-bg);
    color: var(--code-ink);
    border: none;
    padding: 16px;
    font-size: 0.92rem;
    line-height: 1.6;
    resize: vertical;
    min-height: 120px;
    tab-size: 4;
    outline: none;
    display: block;
  }
  .code-actions {
    background: #2a332f;
    padding: 10px 14px;
    display: flex; gap: 10px; align-items: center;
  }
  .btn {
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.1s, filter 0.15s;
  }
  .btn:active { transform: translateY(1px); }
  .btn-run { background: var(--moss); color: #fff; display: inline-flex; align-items: center; gap: 7px; }
  .btn-run:hover { filter: brightness(1.1); }
  .btn-run:disabled { opacity: 0.5; cursor: wait; }
  .btn-reset { background: transparent; color: #9db3a8; border: 1px solid #445; }
  .btn-reset:hover { color: #fff; }
  .output {
    background: #141a18;
    color: var(--code-ink);
    padding: 0 16px;
    font-family: ui-monospace, monospace;
    font-size: 0.9rem;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease, padding 0.25s ease;
  }
  .output.show { max-height: 400px; overflow-y: auto; padding: 14px 16px; }
  .output .out-err { color: #f0876f; }
  .output .out-ok { color: #7fc99a; }

  /* Exercise */
  .exercise {
    background: linear-gradient(135deg, rgba(74,124,89,0.06), rgba(217,164,65,0.06));
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 22px 24px;
    margin: 28px 0;
  }
  .exercise .ex-label { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--moss); font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .ex-feedback { margin-top: 14px; padding: 12px 16px; border-radius: 8px; font-size: 0.95rem; display: none; }
  .ex-feedback.show { display: block; }
  .ex-feedback.ok { background: rgba(74,124,89,0.15); color: var(--moss-dark); border: 1px solid var(--moss); }
  .ex-feedback.err { background: rgba(184,68,46,0.1); color: var(--err); border: 1px solid var(--err); }
  .hint-btn { background: none; border: none; color: var(--clay); cursor: pointer; font-family: inherit; font-size: 0.88rem; text-decoration: underline; padding: 0; margin-top: 8px; }
  .hint-text { display: none; margin-top: 8px; font-size: 0.92rem; font-style: italic; color: #556; }
  .hint-text.show { display: block; }

  /* Quiz */
  .quiz { margin: 24px 0; }
  .quiz-q { font-weight: 600; margin-bottom: 12px; font-size: 1.08rem; }
  .quiz-opt {
    display: block; width: 100%; text-align: left;
    padding: 12px 16px; margin-bottom: 8px;
    background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 1rem;
    transition: background 0.15s, border-color 0.15s;
  }
  .quiz-opt:hover { border-color: var(--moss); }
  .quiz-opt.correct { background: rgba(74,124,89,0.2); border-color: var(--moss); }
  .quiz-opt.wrong { background: rgba(184,68,46,0.12); border-color: var(--err); }
  .quiz-opt:disabled { cursor: default; }

  /* Footer nav */
  .lesson-nav { display: flex; justify-content: space-between; margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--line); gap: 12px; }
  .btn-nav { background: var(--ink); color: var(--paper); padding: 12px 24px; border-radius: 8px; }
  .btn-nav:hover { background: var(--moss-dark); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-nav.secondary { background: transparent; color: var(--ink); border: 1px solid var(--line); }

  .complete-mark { display: inline-flex; align-items: center; gap: 8px; color: var(--moss); font-weight: 600; font-size: 0.9rem; margin-top: 12px; }

  /* Loading */
  #loader {
    position: fixed; inset: 0; background: var(--paper);
    display: grid; place-items: center; z-index: 100;
    transition: opacity 0.4s; text-align: center;
  }
  #loader.hide { opacity: 0; pointer-events: none; }
  .spinner { width: 44px; height: 44px; border: 3px solid var(--line); border-top-color: var(--moss); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mobile */
  .menu-toggle { display: none; }
  @media (max-width: 860px) {
    .sidebar { position: fixed; left: 0; top: 0; z-index: 50; transform: translateX(-100%); transition: transform 0.25s; box-shadow: 4px 0 24px rgba(0,0,0,0.15); }
    .sidebar.open { transform: translateX(0); }
    .main { padding: 72px 22px 100px; }
    .menu-toggle {
      display: flex; position: fixed; top: 14px; left: 14px; z-index: 60;
      background: var(--ink); color: var(--paper); border: none; border-radius: 8px;
      padding: 10px 14px; cursor: pointer; align-items: center; gap: 8px; font-family: inherit; font-weight: 600;
    }
    h1 { font-size: 1.6rem; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 45; }
    .overlay.show { display: block; }
  }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>

<div id="loader">
  <div>
    <div class="spinner"></div>
    <p style="font-weight:600; font-size:1.1rem;">Startar Python-motorn…</p>
    <p style="font-size:0.85rem; color:#667;">Detta tar några sekunder första gången</p>
  </div>
</div>

<button class="menu-toggle" onclick="toggleMenu()">☰ Lektioner</button>
<div class="overlay" onclick="toggleMenu()"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <circle cx="13" cy="13" r="12" stroke="#4a7c59" stroke-width="1.5"/>
          <path d="M13 1 C 6 7, 6 19, 13 25" stroke="#d9a441" stroke-width="1.5" fill="none"/>
          <path d="M13 1 C 20 7, 20 19, 13 25" stroke="#c8663d" stroke-width="1.5" fill="none"/>
          <line x1="1.5" y1="13" x2="24.5" y2="13" stroke="#4a7c59" stroke-width="1.5"/>
        </svg>
        <span>Ormstigen</span>
      </div>
      <div class="tag">Lär dig Python — steg för steg</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">0 av 8 klara</div>
    </div>
    <ul class="nav-list" id="navList"></ul>
  </aside>

  <main class="main" id="main"></main>
</div>

<script>
// ---------- Lektionsinnehåll ----------
const lessons = [
  {
    title: "Välkommen — vad är kod?",
    eyebrow: "Steg 1 · Introduktion",
    html: `
      <p class="lead">Kod är instruktioner du ger till datorn, en rad i taget. Python är ett av världens vänligaste programmeringsspråk att börja med — det läser nästan som engelska.</p>
      <p>Här skriver du riktig Python direkt i webbläsaren. Ingen installation behövs. Prova att köra rutan nedan genom att trycka på <strong>Kör</strong>.</p>
      <div data-code="print('Hej! Jag kör Python.')"></div>
      <p>Det du ser under rutan är <strong>utdata</strong> — datorns svar. Kommandot <span class="inline-code">print()</span> betyder ungefär "skriv ut på skärmen".</p>
      <div class="callout"><strong>Tips:</strong> Du kan ändra texten mellan citattecknen och köra igen. Testa att skriva ditt eget namn!</div>
    `,
  },
  {
    title: "Skriva ut text",
    eyebrow: "Steg 2 · print()",
    html: `
      <p class="lead">Det första verktyget i din verktygslåda är <span class="inline-code">print()</span>. Text i Python omges alltid av citattecken.</p>
      <p>Du kan skriva ut flera rader genom att använda <span class="inline-code">print()</span> flera gånger:</p>
      <div data-code="print('Rad ett')\nprint('Rad två')\nprint('Rad tre')"></div>
      <h2>Din tur</h2>
      <div class="exercise" data-exercise='{"prompt":"Skriv kod som skriver ut ordet <b>Python</b> på skärmen.","check":"contains_output","expect":"Python","hint":"Använd print() och sätt Python inom citattecken: print(&#39;Python&#39;)"}'
        data-starter="# Skriv din kod här\n"></div>
    `,
  },
  {
    title: "Variabler — spara värden",
    eyebrow: "Steg 3 · Variabler",
    html: `
      <p class="lead">En variabel är som en namngiven låda där du sparar ett värde för att använda det senare.</p>
      <div data-code="namn = 'Anna'\nalder = 30\nprint(namn)\nprint(alder)"></div>
      <p>Här skapade vi två lådor: <span class="inline-code">namn</span> innehåller text och <span class="inline-code">alder</span> innehåller ett tal. Text har citattecken, tal har det inte.</p>
      <p>Du kan kombinera text när du skriver ut:</p>
      <div data-code="namn = 'Anna'\nprint('Hej', namn)"></div>
      <h2>Din tur</h2>
      <div class="exercise" data-exercise='{"prompt":"Skapa en variabel som heter <b>stad</b> med värdet <b>Stockholm</b>, och skriv ut den.","check":"contains_output","expect":"Stockholm","hint":"stad = &#39;Stockholm&#39; på första raden, sedan print(stad)"}'
        data-starter="stad = \nprint()"></div>
    `,
  },
  {
    title: "Räkna med tal",
    eyebrow: "Steg 4 · Matematik",
    html: `
      <p class="lead">Python är en utmärkt miniräknare. Du använder <span class="inline-code">+</span>, <span class="inline-code">-</span>, <span class="inline-code">*</span> (gånger) och <span class="inline-code">/</span> (delat med).</p>
      <div data-code="print(5 + 3)\nprint(10 - 4)\nprint(6 * 7)\nprint(20 / 4)"></div>
      <p>Du kan även räkna med variabler:</p>
      <div data-code="pris = 50\nantal = 3\ntotalt = pris * antal\nprint('Totalt:', totalt, 'kronor')"></div>
      <h2>Din tur</h2>
      <div class="exercise" data-exercise='{"prompt":"Räkna ut <b>15 gånger 4</b> och skriv ut resultatet (det ska bli 60).","check":"contains_output","expect":"60","hint":"print(15 * 4)"}'
        data-starter="print()"></div>
    `,
  },
  {
    title: "Kontroll — quiz",
    eyebrow: "Steg 5 · Repetition",
    html: `
      <p class="lead">Dags att testa vad du lärt dig hittills. Välj rätt svar på varje fråga.</p>
      <div class="quiz" data-quiz='{"q":"Vilket kommando skriver ut text på skärmen?","options":["show()","print()","text()","write()"],"answer":1}'></div>
      <div class="quiz" data-quiz='{"q":"Hur skriver man text (en sträng) i Python?","options":["Med hakparenteser [text]","Med citattecken &#39;text&#39;","Med utropstecken !text!","Text behöver inget särskilt"],"answer":1}'></div>
      <div class="quiz" data-quiz='{"q":"Vad blir resultatet av 6 * 7?","options":["13","67","42","76"],"answer":2}'></div>
      <div class="quiz" data-quiz='{"q":"Vad är en variabel?","options":["Ett räknefel","En namngiven plats som sparar ett värde","Ett citattecken","En sorts print"],"answer":1}'></div>
    `,
  },
  {
    title: "Villkor — if och else",
    eyebrow: "Steg 6 · Beslut",
    html: `
      <p class="lead">Med <span class="inline-code">if</span> låter du programmet fatta beslut: gör en sak om något är sant, annars något annat.</p>
      <div data-code="alder = 20\nif alder >= 18:\n    print('Du är myndig')\nelse:\n    print('Du är omyndig')"></div>
      <p>Lägg märke till <strong>kolonet</strong> (:) och att raderna under är <strong>indragna</strong> (fyra mellanslag). Indraget talar om vad som hör till villkoret.</p>
      <div class="callout"><strong>Jämförelser:</strong> <span class="inline-code">==</span> lika med, <span class="inline-code">!=</span> inte lika med, <span class="inline-code">&gt;</span> större än, <span class="inline-code">&lt;</span> mindre än.</div>
      <h2>Din tur</h2>
      <div class="exercise" data-exercise='{"prompt":"Ändra variabeln <b>temp</b> nedan och kör. Om temperaturen är över 25 ska det stå <b>Varmt</b>, annars <b>Svalt</b>. Få programmet att skriva ut <b>Varmt</b>.","check":"contains_output","expect":"Varmt","hint":"Sätt temp till ett tal större än 25, t.ex. temp = 30"}'
        data-starter="temp = 18\nif temp > 25:\n    print('Varmt')\nelse:\n    print('Svalt')"></div>
    `,
  },
  {
    title: "Upprepa med loopar",
    eyebrow: "Steg 7 · Loopar",
    html: `
      <p class="lead">En loop upprepar kod flera gånger utan att du behöver skriva den om och om igen. <span class="inline-code">for</span> är den vanligaste.</p>
      <div data-code="for nummer in range(5):\n    print('Varv', nummer)"></div>
      <p><span class="inline-code">range(5)</span> ger talen 0, 1, 2, 3, 4 — alltså fem varv. Koden inne i loopen är indragen, precis som med <span class="inline-code">if</span>.</p>
      <div data-code="for namn in ['Anna', 'Björn', 'Cecilia']:\n    print('Hej', namn)"></div>
      <h2>Din tur</h2>
      <div class="exercise" data-exercise='{"prompt":"Skriv en loop som skriver ut talen 0 till 9 (använd range).","check":"contains_all_output","expect":["0","9"],"hint":"for i in range(10):\\n    print(i)"}'
        data-starter="for i in range():\n    print()"></div>
    `,
  },
  {
    title: "Ditt första riktiga program",
    eyebrow: "Steg 8 · Projekt",
    html: `
      <p class="lead">Nu sätter vi ihop allt: variabler, matematik, villkor och utskrift. Du bygger en liten prisräknare för en biobiljett.</p>
      <p>Reglerna: en biljett kostar 120 kr, men barn (under 15 år) får rabatt och betalar 80 kr. Prova att köra och ändra <span class="inline-code">alder</span>.</p>
      <div data-code="alder = 12\n\nif alder < 15:\n    pris = 80\nelse:\n    pris = 120\n\nprint('Din ålder:', alder)\nprint('Ditt pris:', pris, 'kr')"></div>
      <h2>Slutuppgift</h2>
      <div class="exercise" data-exercise='{"prompt":"Bygg en loop som skriver ut biljettpriset för åldrarna 10, 14 och 40. Barn under 15 betalar 80, övriga 120. Se till att både <b>80</b> och <b>120</b> förekommer i utskriften.","check":"contains_all_output","expect":["80","120"],"hint":"for alder in [10, 14, 40]:\\n    if alder < 15:\\n        print(80)\\n    else:\\n        print(120)"}'
        data-starter="for alder in [10, 14, 40]:\n    # skriv din if/else här\n    print()"></div>
      <div class="callout" style="margin-top:28px;"><strong>Bra jobbat!</strong> Du behärskar nu utskrift, variabler, matematik, villkor och loopar. Nästa steg tar dig vidare till listor och funktioner — verktygen som gör program riktigt kraftfulla.</div>
    `,
  },
  {
    title: "Listor — samla många värden",
    eyebrow: "Steg 9 · Listor",
    html: `
      <p class="lead">En lista håller flera värden i en och samma variabel. Perfekt när du har många saker som hör ihop, t.ex. en inköpslista.</p>
      <div data-code="frukter = ['äpple', 'banan', 'apelsin']\nprint(frukter)\nprint(frukter[0])\nprint(frukter[1])"></div>
      <p>Du hämtar ett värde med dess <strong>position</strong> inom hakparenteser. Python börjar räkna på <strong>0</strong>, så <span class="inline-code">frukter[0]</span> är det första.</p>
      <p>Listor är gjorda för att loopas igenom:</p>
      <div data-code="frukter = ['äpple', 'banan', 'apelsin']\nfor frukt in frukter:\n    print('Jag gillar', frukt)"></div>
      <p>Du kan lägga till nya värden med <span class="inline-code">.append()</span> och se hur många som finns med <span class="inline-code">len()</span>:</p>
      <div data-code="lista = ['mjölk', 'bröd']\nlista.append('ost')\nprint(lista)\nprint('Antal varor:', len(lista))"></div>
      <h2>Din tur</h2>
      <div class="exercise" data-exercise='{"prompt":"Skapa en lista med tre djur du gillar och skriv ut hur många de är med <b>len()</b>. Se till att talet <b>3</b> syns i utdatan.","check":"contains_output","expect":"3","hint":"djur = [&#39;hund&#39;, &#39;katt&#39;, &#39;häst&#39;]\\nprint(len(djur))"}'
        data-starter="djur = [ ]\nprint(len(djur))"></div>
    `,
  },
  {
    title: "Funktioner — återanvänd kod",

// ---------- State ----------
let pyodide = null;
let current = 0;
const done = new Array(lessons.length).fill(false);

// ---------- Pyodide ----------
async function initPyodide() {
  pyodide = await loadPyodide();
  document.getElementById('loader').classList.add('hide');
}

async function runPython(code, outputEl) {
  outputEl.className = 'output show';
  outputEl.textContent = 'Kör…';
  if (!pyodide) { outputEl.innerHTML = '<span class="out-err">Python laddar fortfarande, försök igen om en sekund.</span>'; return ''; }
  try {
    pyodide.runPython(`
import sys, io
sys.stdout = io.StringIO()
sys.stderr = io.StringIO()
`);
    await pyodide.runPythonAsync(code);
    const stdout = pyodide.runPython('sys.stdout.getvalue()');
    const stderr = pyodide.runPython('sys.stderr.getvalue()');
    let out = stdout || '';
    if (stderr) out += stderr;
    outputEl.innerHTML = out.trim()
      ? `<span class="out-ok">${escapeHtml(out)}</span>`
      : '<span style="color:#889;">(inget skrevs ut)</span>';
    return out;
  } catch (err) {
    const msg = String(err.message || err);
    const clean = msg.split('\n').filter(l => !l.includes('File "<exec>"') && !l.includes('runPython')).slice(-4).join('\n');
    outputEl.innerHTML = `<span class="out-err">Fel i koden:\n${escapeHtml(clean.trim())}</span>`;
    return '__ERROR__';
  }
}

function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ---------- Rendering ----------
function buildNav() {
  const nav = document.getElementById('navList');
  nav.innerHTML = '';
  lessons.forEach((l, i) => {
    const li = document.createElement('li');
    li.className = 'nav-item' + (i === current ? ' active' : '') + (done[i] ? ' done' : '');
    li.innerHTML = `<span class="nav-num">${done[i] ? '✓' : i+1}</span><span>${l.title}</span>`;
    li.onclick = () => { goTo(i); if (window.innerWidth <= 860) toggleMenu(); };
    nav.appendChild(li);
  });
  const count = done.filter(Boolean).length;
  document.getElementById('progressFill').style.width = (count / lessons.length * 100) + '%';
  document.getElementById('progressLabel').textContent = `${count} av ${lessons.length} klara`;
}

function renderLesson(i) {
  const l = lessons[i];
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="eyebrow">${l.eyebrow}</div>
    <h1>${l.title}</h1>
    ${l.html}
    <div class="lesson-nav">
      <button class="btn btn-nav secondary" ${i===0?'disabled':''} onclick="goTo(${i-1})">← Föregående</button>
      <button class="btn btn-nav" id="nextBtn" onclick="markDoneAndNext(${i})">
        ${i === lessons.length-1 ? 'Slutför kursen ✓' : 'Nästa steg →'}
      </button>
    </div>
  `;
  hydrate(main);
  window.scrollTo(0,0);
}

function hydrate(root) {
  // Demo-kodrutor
  root.querySelectorAll('[data-code]').forEach(el => {
    const code = el.getAttribute('data-code');
    el.replaceWith(makeCodeBlock(code, false));
  });
  // Övningar
  root.querySelectorAll('[data-exercise]').forEach(el => {
    const cfg = JSON.parse(el.getAttribute('data-exercise'));
    const starter = el.getAttribute('data-starter') || '';
    el.appendChild(makeExercise(cfg, starter));
  });
  // Quiz
  root.querySelectorAll('[data-quiz]').forEach(el => {
    const cfg = JSON.parse(el.getAttribute('data-quiz'));
    el.appendChild(makeQuiz(cfg));
  });
}

function makeCodeBlock(code, isExercise) {
  const wrap = document.createElement('div');
  wrap.className = 'code-block';
  const rows = Math.max(3, code.split('\n').length);
  wrap.innerHTML = `
    <div class="code-head"><span class="dots"><i></i><i></i><i></i></span><span>Python</span></div>
    <textarea class="editor" spellcheck="false" rows="${rows}"></textarea>
    <div class="code-actions">
      <button class="btn btn-run">▶ Kör</button>
      <button class="btn btn-reset">Återställ</button>
    </div>
    <div class="output"></div>
  `;
  const ta = wrap.querySelector('.editor');
  ta.value = code;
  enableTab(ta);
  const runBtn = wrap.querySelector('.btn-run');
  const out = wrap.querySelector('.output');
  runBtn.onclick = async () => {
    runBtn.disabled = true;
    await runPython(ta.value, out);
    runBtn.disabled = false;
  };
  wrap.querySelector('.btn-reset').onclick = () => { ta.value = code; out.className='output'; };
  return wrap;
}

function makeExercise(cfg, starter) {
  const box = document.createElement('div');
  const cb = makeCodeBlock(starter, true);
  // Gör om körknappen till en "kontrollera"-knapp
  const runBtn = cb.querySelector('.btn-run');
  const ta = cb.querySelector('.editor');
  const out = cb.querySelector('.output');
  runBtn.innerHTML = '▶ Kör &amp; kontrollera';
  const feedback = document.createElement('div');
  feedback.className = 'ex-feedback';

  runBtn.onclick = async () => {
    runBtn.disabled = true;
    const output = await runPython(ta.value, out);
    runBtn.disabled = false;
    let pass = false;
    if (output !== '__ERROR__') {
      if (cfg.check === 'contains_output') {
        pass = output.includes(cfg.expect);
      } else if (cfg.check === 'contains_all_output') {
        pass = cfg.expect.every(e => output.includes(e));
      }
    }
    feedback.className = 'ex-feedback show ' + (pass ? 'ok' : 'err');
    feedback.innerHTML = pass
      ? '✓ Snyggt! Rätt svar. Gå vidare till nästa steg när du vill.'
      : '✗ Inte riktigt än — kolla utdatan ovan och försök igen. Behöver du en ledtråd?';
  };

  const hintWrap = document.createElement('div');
  hintWrap.innerHTML = `
    <div class="ex-label">📝 Övning</div>
    <p>${cfg.prompt}</p>
  `;
  box.appendChild(hintWrap);
  box.appendChild(cb);
  box.appendChild(feedback);

  const hintBtn = document.createElement('button');
  hintBtn.className = 'hint-btn';
  hintBtn.textContent = 'Visa ledtråd';
  const hint = document.createElement('div');
  hint.className = 'hint-text';
  hint.innerHTML = '💡 ' + cfg.hint.replace(/\\n/g,'<br>');
  hintBtn.onclick = () => { hint.classList.toggle('show'); hintBtn.textContent = hint.classList.contains('show') ? 'Dölj ledtråd' : 'Visa ledtråd'; };
  box.appendChild(hintBtn);
  box.appendChild(hint);
  return box;
}

function makeQuiz(cfg) {
  const box = document.createElement('div');
  box.innerHTML = `<div class="quiz-q">${cfg.q}</div>`;
  const opts = [];
  cfg.options.forEach((opt, idx) => {
    const b = document.createElement('button');
    b.className = 'quiz-opt';
    b.innerHTML = opt;
    b.onclick = () => {
      if (b.disabled) return;
      opts.forEach(o => o.disabled = true);
      if (idx === cfg.answer) {
        b.classList.add('correct');
      } else {
        b.classList.add('wrong');
        opts[cfg.answer].classList.add('correct');
      }
    };
    opts.push(b);
    box.appendChild(b);
  });
  return box;
}

function enableTab(ta) {
  ta.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = ta.selectionStart, en = ta.selectionEnd;
      ta.value = ta.value.slice(0,s) + '    ' + ta.value.slice(en);
      ta.selectionStart = ta.selectionEnd = s + 4;
    }
  });
}

// ---------- Navigation ----------
function goTo(i) {
  if (i < 0 || i >= lessons.length) return;
  current = i;
  buildNav();
  renderLesson(i);
}
function markDoneAndNext(i) {
  done[i] = true;
  if (i < lessons.length - 1) {
    goTo(i + 1);
  } else {
    buildNav();
    renderLesson(i);
    alert('🎉 Grattis! Du har slutfört alla åtta steg i Ormstigen. Fortsätt experimentera i kodrutorna!');
  }
}
function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.querySelector('.overlay').classList.toggle('show');
}

// ---------- Start ----------
buildNav();
renderLesson(0);
initPyodide();
</script>
</body>
</html>
